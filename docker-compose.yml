services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chistes-nicolas-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chistes-nicolas-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-chistes_nicolas}
      DB_USER: ${POSTGRES_USER:-chistes}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-chistes_secret}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: chistes-nicolas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chistes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chistes_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chistes_nicolas}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chistes} -d ${POSTGRES_DB:-chistes_nicolas}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: chistes_nicolas_pgdata
    driver: local
